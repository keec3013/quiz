<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광덕산 환경교육센터 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #2d5a27;
    --moss: #4a7c3f;
    --leaf: #7ab648;
    --sky: #e8f4e8;
    --earth: #5c4033;
    --bark: #8b6355;
    --parchment: #f5f0e8;
    --cream: #faf7f2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* 배경 패턴 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(74,124,63,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(45,90,39,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: white;
    border-radius: 20px;
    max-width: 480px;
    width: 100%;
    overflow: hidden;
    box-shadow:
      0 4px 6px rgba(0,0,0,0.04),
      0 20px 40px rgba(45,90,39,0.12);
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    background: var(--forest);
    padding: 28px 28px 24px;
    position: relative;
    overflow: hidden;
  }

  .card-header::after {
    content: '🌿';
    position: absolute;
    right: -10px;
    top: -10px;
    font-size: 80px;
    opacity: 0.12;
    transform: rotate(20deg);
  }

  .floor-badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.9);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .q-number {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--leaf);
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .card-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
  }

  .card-body {
    padding: 32px 28px 36px;
  }

  .question-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    color: #1a2e18;
    line-height: 1.6;
    letter-spacing: -0.3px;
  }

  .question-sub {
    margin-top: 16px;
    font-size: 14px;
    color: #6b7c69;
    line-height: 1.7;
    font-weight: 300;
  }

  .divider {
    margin: 24px 0;
    height: 1px;
    background: linear-gradient(to right, var(--leaf), transparent);
    opacity: 0.3;
  }

  .hint-box {
    background: var(--sky);
    border-left: 3px solid var(--leaf);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--forest);
    line-height: 1.6;
    display: none;
  }

  .hint-box.visible { display: block; }

  .footer-note {
    margin-top: 20px;
    font-size: 12px;
    color: #aab8a9;
    text-align: center;
    letter-spacing: 0.5px;
  }

  /* 오류 화면 */
  .error-screen {
    text-align: center;
    padding: 48px 28px;
    animation: slideUp 0.5s ease both;
  }

  .error-icon { font-size: 48px; margin-bottom: 16px; }
  .error-title { font-family: 'Noto Serif KR', serif; font-size: 20px; color: #333; margin-bottom: 8px; }
  .error-desc { font-size: 14px; color: #888; }

  /* 센터 로고 영역 */
  .logo-area {
    position: relative;
    z-index: 1;
    margin-bottom: 20px;
    text-align: center;
  }

  .logo-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    color: #8aaa85;
    letter-spacing: 1.5px;
    font-weight: 400;
  }
</style>
</head>
<body>

<div class="logo-area">
  <div class="logo-text">광덕산환경교육센터</div>
</div>

<div class="card" id="card">
  <div class="error-screen" id="errorScreen">
    <div class="error-icon">🌱</div>
    <div class="error-title">문제를 찾을 수 없어요</div>
    <div class="error-desc">올바른 QR코드를 스캔해주세요</div>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 📝 문제 데이터 — 여기만 수정하세요
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const questions = {
  // 지하 1층 (id: 1~5)
  1: {
    floor: "지하 1층",
    number: "Q1",
    question: "지구가 너무 뜨거워지지도, 너무 차가워지지도 않게 온도를 딱 맞게 지켜주는 '지구의 에어컨' 같은 게 있대요! 우리 주변에서 지구의 온도를 조절해주는 고마운 친구는 누구일까요? 안내판을 천천히 읽어보고 가족과 함께 이야기 나눠 보세요.",
    sub: "필요 시 보충 설명을 여기에 입력 (없으면 비워두세요)",
    hint: ""  // 힌트 있으면 입력, 없으면 빈칸
  },
  2: {
    floor: "지하 1층",
    number: "Q2",
    question: "땅속은 여름에는 시원하고 겨울에는 따뜻하다는 사실, 알고 있었나요? 광덕산환경교육센터는 이 신기한 땅의 비밀을 이용해서 시원하게, 또 따뜻하게 지내고 있어요. 이런 시설을 '○○발전'이라고 부른답니다. 👉 ○○에 들어갈 말은?",
    sub: "",
    hint: ""
  },
  3: {
    floor: "지하 1층",
    number: "Q3",
    question: "추운 곳에서도 적은 나무로 따뜻하게 요리하고 몸을 녹일 수 있는 '생존을 위한 따뜻한 기술'이 있어요. '케이팝 데몬 헌터스'의 인기 캐릭터도 그려져 있답니다. 찾아보세요! 👀 이런 기술을 '○○기술'이라고 해요. 👉 ○○에 들어갈 말은?",
    sub: "",
    hint: ""
  },
  4: {
    floor: "지하 1층",
    number: "Q4",
    question: "지하인데도 햇빛이 쨍~하고 들어와서 예쁜 꽃과 식물이 자라는 화단이 있어요! 신기하죠? 바깥의 햇빛을 지하까지 데려와 주니까 전등을 켜지 않아도 환하답니다. 전기도 아끼고, 식물도 행복하고! 이런 걸 '○○채광'이라고 해요. 👉 ○○에 들어갈 말은?",
    sub: "",
    hint: ""
  },

  // 1층 (id: 6~10)
  6: {
    floor: "1층",
    number: "Q6",
    question: "건물의 벽을 가만히 만져보고 살펴보세요. 시멘트가 아니라 자연에서 가져온 재료로 만들어졌답니다. 옛날 우리 조상들도 집을 지을 때 사용했던 재료예요. 따뜻한 느낌이 들지 않나요? 이 재료의 이름은 무엇일까요?",
    sub: "",
    hint: ""
  },
  7: {
    floor: "1층",
    number: "Q7",
    question: "'쌩~' 하고 부는 바람의 힘으로 전기를 만드는 시설이에요. 그런데 실내에는 바람이 불지 않으니, 우리 가족이 직접 손으로 돌려서 전기를 만들어 볼까요? 날개가 빙글빙글 돌아갈 때마다 전기가 만들어진답니다. 이런 시설을 '○○발전'이라고 해요. ○○에 들어갈 말은?",
    sub: "",
    hint: ""
  },
  8: {
    floor: "1층",
    number: "Q8",
    question: "콩콩 밟거나 폴짝폴짝 뛰면 전구에 반짝! 불이 들어오는 신기한 발판이 있어요. 우리 몸을 움직이는 힘이 전기로 바뀌는 거죠. 가족과 함께 신나게 뛰어보세요! 이런 시설을 '○○발전'이라고 합니다. ○○에 들어갈 말은?",
    sub: "",
    hint: ""
  },
  9: {
    floor: "1층",
    number: "Q9",
    question: "내가 직접 전기를 만든다!' 페달을 힘차게 굴리면 전구가 환하게 밝아지는 자전거예요. 다리에 힘을 주고 열심히 굴려볼까요? 이 자전거의 이름은 '○○○○자전거'랍니다. ○○○○에 들어갈 말은?",
    sub: "",
    hint: ""
  },

  // 2층 (id: 11~15)
  11: {
    floor: "2층",
    number: "Q11",
    question: "계단을 한 칸 한 칸 오르다 보면 멋진 액자가 보일 거예요. 작은 곤충부터 커다란 동물까지, 그리고 우리 사람까지… 지구에 사는 모든 생명은 보이지 않는 끈으로 이어져 있답니다. 이 액자의 제목은 '지구별 생명의 ○○'이에요. ○○에 들어갈 말은?",
    sub: "",
    hint: ""
  },
  12: {
    floor: "2층",
    number: "Q12",
    question: "쨍쨍한 햇빛을 받아 전기를 만드는 시설이에요. 우리 센터의 지붕 위에도 있고, 하늘정원(옥상)에도 설치되어 있답니다. 한번 올려다보세요! 이런 시설을 '○○○발전'이라고 해요. ○○○에 들어갈 말은?",
    sub: "",
    hint: ""
  },
  13: {
    floor: "2층",
    number: "Q13",
    question: "하늘정원에서 주변을 둘러보세요. 산도, 나뭇가지도, 구름도 모두 부드럽게 휘어져 있죠? 자연에는 '직선'이 거의 없답니다.
우리 센터 건물도 자연을 닮아 반듯하지 않고 부드럽게 구부러진 모양으로 지어졌어요. 건물을 한번 살펴보세요!
이렇게 부드럽게 휘어진 선을 무엇이라고 부를까요?",
    sub: "",
    hint: "'직선'의 반대말, 두 글자!"
  },
  14: {
    floor: "2층",
    number: "Q14",
    question: "이건 그냥 버리는 거 아니야?" 아니에요! 버려지는 병뚜껑이 멋진 새 물건으로 다시 태어나는 곳이에요. 단순히 재활용하는 게 아니라, 더 새롭고 멋진 쓰임을 더해주는 거죠. 영어로는 '업사이클링'이라고 하는데, 우리말로는 '○○○'이라고 한답니다. ○○○에 들어갈 말은?",
    sub: "",
    hint: ""
  },
};
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id'));
const q = questions[id];
const card = document.getElementById('card');

if (q) {
  card.innerHTML = `
    <div class="card-header">
      <div class="floor-badge">${q.floor}</div>
      <div class="q-number">${q.number}</div>
      <div class="card-title">광덕산환경교육센터</div>
    </div>
    <div class="card-body">
      <div class="question-text">${q.question}</div>
      ${q.sub ? `<div class="question-sub">${q.sub}</div>` : ''}
      ${q.hint ? `<div class="divider"></div><div class="hint-box visible">💡 ${q.hint}</div>` : ''}
      <div class="footer-note">정답은 현장에서 확인하세요 🌿</div>
    </div>
  `;
}
</script>
</body>
</html>
